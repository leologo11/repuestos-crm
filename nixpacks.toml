[phases.setup]
nixPkgs = ['nodejs_20', 'chromium', 'nss', 'freetype', 'harfbuzz', 'ca-certificates', 'ttf-opensans']

[phases.build]
cmds = ['npm install', 'npm run build']

[start]
cmd = 'node server.js'

[variables]
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = 'true'
PUPPETEER_EXECUTABLE_PATH = '/run/current-system/sw/bin/chromium'
