    respondido: { bg:"var(--accent-dim)", color:"var(--accent)" },
    esperando: { bg:"var(--amber-dim)", color:"var(--amber)" },

}

function MetricCard({ label, value, delta, color, icon }) {
  const positive = delta?.startsWith("+");
  return (
    <Card style={{ padding:"20px 22px", display:"flex", flexDirection:"column", gap:14 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
        <span style={{ fontSize:12.5, fontWeight:500, color:"var(--text2)" }}>{label}</span>
        <div style={{ width:34, height:34, borderRadius:8, background:color+"22", display:"flex", alignItems:"center", justifyContent:"center" }}>
          <Ico name={icon} size={17} style={{ color }} />
        </div>
      </div>
      <div>
        <div style={{ fontSize:26, fontWeight:700, color:"var(--text)", letterSpacing:"-0.5px" }}>{value}</div>
        {delta && <div style={{ fontSize:12, color: positive ? "var(--accent)" : "var(--red)", marginTop:4, fontWeight:500 }}>{delta} vs mes anterior</div>}
      </div>
    </Card>
  );
}

function LineChart({ data, labels, color }) {
  const ref = useRef();
  const chart = useRef();
  useEffect(() => {
    if (chart.current) chart.current.destroy();
    const ctx = ref.current.getContext("2d");
    const grad = ctx.createLinearGradient(0,0,0,120);
    grad.addColorStop(0, "rgba(52,199,89,0.27)");
    grad.addColorStop(1, "rgba(52,199,89,0)");
    chart.current = new Chart(ctx, {
      type:"line",
      data: { labels, datasets:[{ data, borderColor:color, backgroundColor:grad, fill:true, tension:0.4, pointRadius:0, borderWidth:2 }] },
      options: {
        responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{display:false}, tooltip:{ mode:"index", intersect:false, callbacks:{ label: c => `$${c.raw.toLocaleString()}` } } },
        scales:{ x:{ grid:{display:false}, ticks:{color:"#888", font:{size:11}} }, y:{ grid:{color:"#88888811"}, ticks:{color:"#888", font:{size:11}, callback:v=>`$${(v/1000).toFixed(0)}k`} } },
      }
    });
    return () => chart.current?.destroy();
  }, [data, color]);
  return <div style={{ position:"relative", height:140 }}><canvas ref={ref}/></div>;
}

function BarChart({ data, labels, colors }) {
  const ref = useRef();
  const chart = useRef();
  useEffect(() => {
    if (chart.current) chart.current.destroy();
    chart.current = new Chart(ref.current.getContext("2d"), {
      type:"bar",
      data:{ labels, datasets:[{ data, backgroundColor:colors, borderRadius:5, borderSkipped:false }] },
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.raw}%`}}},
        scales:{ x:{grid:{display:false},ticks:{color:"#888",font:{size:11}}}, y:{grid:{color:"#88888811"},ticks:{color:"#888",font:{size:11},callback:v=>v+"%"}} }
      }
    });
    return () => chart.current?.destroy();
  }, []);
  return <div style={{ position:"relative", height:120 }}><canvas ref={ref}/></div>;
}

                  <div style={{ width:32, height:32, borderRadius:8, background:"var(--amber-dim)", color:"var(--amber)", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                    <Ico name="clock" size={14} style={{ color:"var(--amber)" }}/>
                  </div>
                  <div>
                    <div style={{ fontSize:11, color:"var(--text2)", marginBottom:5 }}>{selected.proveedor}</div>
                    <div style={{ display:"inline-flex", alignItems:"center", gap:7, padding:"9px 14px", borderRadius:8, background:"var(--amber-dim)", border:"1px solid oklch(72% 0.15 75 / 0.2)", fontSize:13, color:"var(--amber)", fontWeight:500 }}>
                      <Ico name="clock" size={14} style={{ color:"var(--amber)" }}/>
                      Esperando respuesta del proveedor…
                    </div>
                  </div>
                </div>
              )}
            </div>
          </Card>
        </div>
      )}
    </div>
  );
}

    <div style={{ padding:28, flex:1, overflowY:"auto", maxWidth:600 }}>
      <Card style={{ padding:24, marginBottom:16 }}>
        <div style={{ fontWeight:700, fontSize:14, marginBottom:16 }}>Margen global por defecto</div>
        <div style={{ display:"flex", alignItems:"center", gap:14 }}>
          <input type="range" min={5} max={60} value={margin} onChange={e=>setMargin(+e.target.value)} style={{ flex:1, accentColor:"var(--accent)" }}/>
          <span style={{ fontSize:22, fontWeight:800, color:"var(--accent)", minWidth:50 }}>{margin}%</span>
        </div>
        <div style={{ fontSize:12, color:"var(--text2)", marginTop:8 }}>Se aplica como base. Puedes ajustar por proveedor o producto.</div>
      </Card>
      <Card style={{ padding:24, marginBottom:16 }}>
        <div style={{ fontWeight:700, fontSize:14, marginBottom:16 }}>WhatsApp API</div>
        <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
          {[["Phone Number ID","284719842347281"],["API Token","••••••••••••••••••••"],["Webhook URL","https://web-repuestos.cl/webhook"]].map(([l,v]) => (
            <div key={l}>
              <label style={{ fontSize:12, fontWeight:600, color:"var(--text2)", display:"block", marginBottom:5 }}>{l}</label>
              <input defaultValue={v} style={{ width:"100%", padding:"9px 12px", borderRadius:8, border:"1px solid var(--border)", background:"var(--bg)", color:"var(--text)", fontFamily:"monospace", fontSize:12 }}/>
            </div>
          ))}
          <button style={{ alignSelf:"flex-start", padding:"9px 18px", borderRadius:8, background:"var(--accent)", color:"white", border:"none", cursor:"pointer", fontFamily:"inherit", fontSize:13, fontWeight:600 }}>Guardar configuración</button>
        </div>
      </Card>
    </div>
  );
}

// ── App ────────────────────────────────────────────────────
const PAGE_TITLES = {
  dashboard: ["Dashboard", "Hoy, 24 de Abril 2026"],
  proveedores: ["Proveedores", "Gestiona tus proveedores de repuestos"],
  clientes: ["Clientes", "Historial y datos de clientes"],
  ventas: ["Ventas / Cotizaciones", "Seguimiento de pedidos y márgenes"],
  ai: ["Log de IA · WhatsApp", "Conversaciones en tiempo real"],
  inbox: ["Inbox CRM", "Omnichannel — Clientes & Proveedores"],
  config: ["Configuración", "Ajustes del sistema"],
};

function App() {
  const [active, setActive] = useState("dashboard");
  const [collapsed, setCollapsed] = useState(false);
  const [dark, setDark] = useState(false);

  useEffect(() => {
    document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
  }, [dark]);

  const [title, subtitle] = PAGE_TITLES[active] || ["—",""];

  return (
    <>
      <Sidebar active={active} setActive={setActive} collapsed={collapsed} setCollapsed={setCollapsed} dark={dark} setDark={setDark}/>
      <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
        <Topbar title={title} subtitle={subtitle}/>
        <div style={{ flex:1, overflow:"hidden", display:"flex", flexDirection:"column" }}>
          {active==="dashboard" && <Dashboard/>}
          {active==="proveedores" && <ProveedoresView/>}
          {active==="clientes" && <ClientesView/>}
          {active==="ventas" && <VentasView/>}
          {active==="ai" && <AILogView/>}
          {active==="inbox" && <InboxView/>}
          {active==="config" && <ConfigView/>}
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
